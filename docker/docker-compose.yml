version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pharma_postgres
    environment:
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharma123
      POSTGRES_DB: pharmadb
    ports:
      - "5432:5432"
    volumes:
      - pharma_pgdata:/var/lib/postgresql/data
      - ../scripts/setup-db.sql:/docker-entrypoint-initdb.d/setup-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharmadb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pharma_pgdata:
